services:
  - type: pgsql
    name: skilledger-licenses-db
    plan: free
    region: oregon
    databaseName: skilledger_licenses
    databaseUser: skilledger
    ipAllowList: []

  - - type: web
    name: skilledger-licenses-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skilledger-licenses-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
    healthCheckPath: /health
    autoDeploy: true
